apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: flagplane-vault
spec:
  provider:
    # Choose one provider block and remove the others.
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: https://flagplane-kv.vault.azure.net/
      serviceAccountRef:
        name: external-secrets-sa
        namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: platform-secrets
  namespace: flagplane
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: flagplane-vault
  target:
    name: platform-secrets
    creationPolicy: Owner
  data:
    - secretKey: controlPlaneAuthToken
      remoteRef:
        key: flagplane/controlPlaneAuthToken
    - secretKey: grafanaAdminPassword
      remoteRef:
        key: flagplane/grafanaAdminPassword
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alerting-secrets
  namespace: flagplane
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: flagplane-vault
  target:
    name: alerting-secrets
    creationPolicy: Owner
  data:
    - secretKey: webhook-url
      remoteRef:
        key: flagplane/alertingWebhookUrl
---
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: flagplane
type: Opaque
stringData:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: pagerduty-primary
      routes:
      - matchers:
        - severity="warning"
        receiver: slack-primary
      - matchers:
        - severity="critical"
        receiver: pagerduty-primary
      group_by: [alertname, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
    receivers:
    - name: slack-primary
      slack_configs:
      - api_url_file: /etc/alertmanager/secrets/webhook-url
        channel: '#flagplane-alerts'
        send_resolved: true
    - name: pagerduty-primary
      pagerduty_configs:
      - routing_key: "your-pagerduty-routing-key"
        severity: '{{ .CommonLabels.severity }}'
        send_resolved: true
