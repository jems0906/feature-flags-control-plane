apiVersion: v1
kind: Namespace
metadata:
  name: flagplane
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane-sa
  namespace: flagplane
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: microservice-demo-sa
  namespace: flagplane
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-sa
  namespace: flagplane
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
  namespace: flagplane
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-sa
  namespace: flagplane
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertmanager-sa
  namespace: flagplane
automountServiceAccountToken: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: flagplane
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: flagplane
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: flagplane
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: flagplane
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      serviceAccountName: redis-sa
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: redis
        image: redis:7-alpine
        imagePullPolicy: IfNotPresent
        args: ["--save", "", "--appendonly", "no"]
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: flagplane
spec:
  selector:
    app: redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
---
# Control Plane
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: flagplane
  labels:
    app: control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: control-plane-sa
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: control-plane
        image: ghcr.io/jems0906/control-plane:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: REDIS_ADDR
          value: redis:6379
        - name: CONTROL_PLANE_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: platform-secrets
              key: controlPlaneAuthToken
        - name: DATA_DIR
          value: /tmp/data
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: flagplane
spec:
  selector:
    app: control-plane
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
# Microservice Demo
apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-demo
  namespace: flagplane
  labels:
    app: microservice-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: microservice-demo
  template:
    metadata:
      labels:
        app: microservice-demo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: microservice-demo-sa
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: microservice-demo
        image: ghcr.io/jems0906/microservice-demo:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: CONTROL_PLANE_URL
          value: "http://control-plane:8080"
        - name: CONTROL_PLANE_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: platform-secrets
              key: controlPlaneAuthToken
        readinessProbe:
          httpGet:
            path: /demo/health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /demo/health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 30
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: microservice-demo
  namespace: flagplane
spec:
  selector:
    app: microservice-demo
  ports:
  - name: http
    port: 8081
    targetPort: 8081
---
# Prometheus configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: flagplane
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/alert_rules.yml
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']
    scrape_configs:
      - job_name: 'control-plane'
        static_configs:
          - targets: ['control-plane:8080']
        metrics_path: /metrics
      - job_name: 'microservice-demo'
        static_configs:
          - targets: ['microservice-demo:8081']
        metrics_path: /metrics
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
  alert_rules.yml: |
    groups:
      - name: flagplane-alerts
        rules:
          - alert: ControlPlaneHighErrorRate
            expr: (sum(rate(control_plane_errors_total[5m])) / clamp_min(sum(rate(control_plane_requests_total[5m])), 1)) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Control plane high error rate"
              description: "control_plane_errors_total / control_plane_requests_total exceeded 5% for 5 minutes."

          - alert: ControlPlaneHighLatencyP95
            expr: histogram_quantile(0.95, sum by (le) (rate(control_plane_latency_ms_bucket[5m]))) > 250
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Control plane p95 latency high"
              description: "control_plane_latency_ms p95 is above 250ms."

          - alert: RateLimitThrottlingBurst
            expr: sum(rate(rate_limit_throttled_total[5m])) > 5
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Sustained throttling detected"
              description: "rate_limit_throttled_total is increasing by more than 5 req/s."

          - alert: CircuitBreakerOpen
            expr: max(circuit_breaker_state) >= 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Circuit breaker open"
              description: "At least one circuit breaker is open."

          - alert: ControlPlaneDown
            expr: up{job="control-plane"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Control plane target down"
              description: "Prometheus cannot scrape the control-plane service."

          - alert: ControlPlaneReplicaUnavailable
            expr: kube_deployment_status_replicas_available{deployment="control-plane", namespace="flagplane"} < 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Control-plane replicas unavailable"
              description: "Available control-plane replicas dropped below desired count (2)."
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: flagplane
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: default-null
      routes:
      - matchers:
        - severity="critical"
        receiver: webhook-primary
      group_by: [alertname, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h
    receivers:
    - name: default-null
    - name: webhook-primary
      webhook_configs:
      - url_file: /etc/alertmanager/secrets/webhook-url
        send_resolved: true
---
# Prometheus
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: flagplane
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus-sa
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: prometheus
        image: prom/prometheus:v2.51.0
        args:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.path=/prometheus"
        - "--web.enable-lifecycle"
        ports:
        - containerPort: 9090
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: data
          mountPath: /prometheus
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: data
        persistentVolumeClaim:
          claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: flagplane
spec:
  selector:
    app: prometheus
  ports:
  - name: http
    port: 9090
    targetPort: 9090
---
# Alertmanager
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: flagplane
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      serviceAccountName: alertmanager-sa
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.27.0
        args:
        - "--config.file=/etc/alertmanager/alertmanager.yml"
        - "--storage.path=/alertmanager"
        ports:
        - containerPort: 9093
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/alertmanager
        - name: webhook-secret
          mountPath: /etc/alertmanager/secrets
          readOnly: true
        - name: data
          mountPath: /alertmanager
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          runAsGroup: 65534
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: config
        configMap:
          name: alertmanager-config
      - name: webhook-secret
        secret:
          secretName: alerting-secrets
          items:
          - key: webhook-url
            path: webhook-url
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: flagplane
spec:
  selector:
    app: alertmanager
  ports:
  - name: http
    port: 9093
    targetPort: 9093
---
# Grafana
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: flagplane
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      serviceAccountName: grafana-sa
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: grafana
        image: grafana/grafana:10.4.0
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: platform-secrets
              key: grafanaAdminPassword
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        volumeMounts:
        - name: data
          mountPath: /var/lib/grafana
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: grafana-data
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: flagplane
spec:
  selector:
    app: grafana
  ports:
  - name: http
    port: 3000
    targetPort: 3000
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: control-plane-pdb
  namespace: flagplane
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: control-plane
---
# Network policies
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: flagplane
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-control-plane-ingress
  namespace: flagplane
spec:
  podSelector:
    matchLabels:
      app: control-plane
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    - podSelector:
        matchLabels:
          app: microservice-demo
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-microservice-demo-ingress
  namespace: flagplane
spec:
  podSelector:
    matchLabels:
      app: microservice-demo
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 8081
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  namespace: flagplane
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: control-plane
    ports:
    - protocol: TCP
      port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-ingress
  namespace: flagplane
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: grafana
    ports:
    - protocol: TCP
      port: 9090
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alertmanager-ingress
  namespace: flagplane
spec:
  podSelector:
    matchLabels:
      app: alertmanager
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9093
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-ingress
  namespace: flagplane
spec:
  podSelector:
    matchLabels:
      app: grafana
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
---
# Ingress (TLS)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: control-plane-ingress
  namespace: flagplane
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.flagplane.local
    secretName: flagplane-tls
  rules:
  - host: api.flagplane.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: control-plane
            port:
              number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservice-demo-ingress
  namespace: flagplane
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - demo.flagplane.local
    secretName: flagplane-tls
  rules:
  - host: demo.flagplane.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: microservice-demo
            port:
              number: 8081
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: flagplane
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - grafana.flagplane.local
    secretName: flagplane-tls
  rules:
  - host: grafana.flagplane.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
